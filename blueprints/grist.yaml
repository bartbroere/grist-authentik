# Blueprint applied automatically by the Authentik worker on startup.
# It does two things:
#   1. Creates an enrollment (self sign-up) flow and links it to the default
#      login page, so users can register themselves.
#   2. Creates the OAuth2/OIDC provider + application for Grist.
version: 1
metadata:
  name: Grist - OIDC provider and open enrollment
  labels:
    blueprints.goauthentik.io/instantiate: "true"
context: {}
entries:
  # Make sure the default flows this blueprint references exist first
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Authentication flow
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Provider authorization flow (implicit consent)
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Provider invalidation flow
      required: true

  # ---------------------------------------------------------------------
  # Enrollment (sign-up) flow
  # ---------------------------------------------------------------------
  - model: authentik_flows.flow
    id: enrollment-flow
    identifiers:
      slug: grist-enrollment
    attrs:
      name: Sign up
      title: Create your account
      designation: enrollment
      authentication: require_unauthenticated

  - model: authentik_stages_prompt.prompt
    id: prompt-username
    identifiers:
      name: grist-enrollment-field-username
    attrs:
      field_key: username
      label: Username
      type: username
      required: true
      placeholder: Username
      order: 0

  - model: authentik_stages_prompt.prompt
    id: prompt-name
    identifiers:
      name: grist-enrollment-field-name
    attrs:
      field_key: name
      label: Name
      type: text
      required: true
      placeholder: Name
      order: 1

  - model: authentik_stages_prompt.prompt
    id: prompt-email
    identifiers:
      name: grist-enrollment-field-email
    attrs:
      field_key: email
      label: Email
      type: email
      required: true
      placeholder: Email
      order: 2

  - model: authentik_stages_prompt.prompt
    id: prompt-password
    identifiers:
      name: grist-enrollment-field-password
    attrs:
      field_key: password
      label: Password
      type: password
      required: true
      placeholder: Password
      order: 3

  - model: authentik_stages_prompt.prompt
    id: prompt-password-repeat
    identifiers:
      name: grist-enrollment-field-password-repeat
    attrs:
      field_key: password_repeat
      label: Password (repeat)
      type: password
      required: true
      placeholder: Password (repeat)
      order: 4

  - model: authentik_stages_prompt.promptstage
    id: enrollment-prompt-stage
    identifiers:
      name: grist-enrollment-prompt
    attrs:
      fields:
        - !KeyOf prompt-username
        - !KeyOf prompt-name
        - !KeyOf prompt-email
        - !KeyOf prompt-password
        - !KeyOf prompt-password-repeat

  - model: authentik_stages_user_write.userwritestage
    id: enrollment-user-write
    identifiers:
      name: grist-enrollment-user-write
    attrs:
      user_creation_mode: always_create
      create_users_as_inactive: false
      user_type: internal

  - model: authentik_stages_user_login.userloginstage
    id: enrollment-user-login
    identifiers:
      name: grist-enrollment-user-login
    attrs: {}

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf enrollment-flow
      stage: !KeyOf enrollment-prompt-stage
      order: 10
  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf enrollment-flow
      stage: !KeyOf enrollment-user-write
      order: 20
  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf enrollment-flow
      stage: !KeyOf enrollment-user-login
      order: 30

  # Show a "Sign up" link on the default login page.
  # user_fields must be restated: blueprint updates validate the full
  # serializer, and omitting it would fail with "no user fields selected".
  - model: authentik_stages_identification.identificationstage
    identifiers:
      name: default-authentication-identification
    attrs:
      user_fields:
        - username
        - email
      enrollment_flow: !KeyOf enrollment-flow

  # ---------------------------------------------------------------------
  # OIDC provider + application for Grist
  # ---------------------------------------------------------------------
  - model: authentik_providers_oauth2.oauth2provider
    id: grist-provider
    identifiers:
      name: Grist
    attrs:
      client_type: confidential
      client_id: grist
      client_secret: !Env GRIST_OIDC_CLIENT_SECRET
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, authentik Self-signed Certificate],
        ]
      redirect_uris:
        - matching_mode: strict
          url: !Env GRIST_REDIRECT_URI
      sub_mode: hashed_user_id
      property_mappings:
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-openid],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-email],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-profile],
          ]

  - model: authentik_core.application
    identifiers:
      slug: grist
    attrs:
      name: Grist
      provider: !KeyOf grist-provider
      policy_engine_mode: any
